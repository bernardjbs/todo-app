services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      - NODE_ENV=production

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - '80:80'
    depends_on:
      - api
